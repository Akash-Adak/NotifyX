<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kafka Live Notifications</title>

    <!-- WebSocket libs -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>

    <style>
        :root {
            color-scheme: dark;
            --bg-top: #0b1224;
            --bg-bottom: #18263d;
            --surface: rgba(15, 23, 42, 0.72);
            --surface-strong: rgba(15, 23, 42, 0.9);
            --surface-border: rgba(148, 163, 184, 0.2);
            --text-main: #e2e8f0;
            --text-soft: #94a3b8;
            --accent-green: #22c55e;
            --accent-blue: #3b82f6;
            --ring: rgba(56, 189, 248, 0.45);
        }

        * {
            box-sizing: border-box;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
            white-space: nowrap;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Inter', sans-serif;
            background:
                radial-gradient(circle at 20% 10%, rgba(34, 197, 94, 0.2), transparent 40%),
                radial-gradient(circle at 80% 0%, rgba(59, 130, 246, 0.2), transparent 35%),
                linear-gradient(145deg, var(--bg-top), var(--bg-bottom));
            color: var(--text-main);
            display: flex;
            justify-content: center;
            padding: 28px 16px;
        }

        .app {
            width: min(980px, 100%);
            padding: 24px;
            border-radius: 20px;
            background: var(--surface);
            border: 1px solid var(--surface-border);
            box-shadow: 0 30px 80px rgba(2, 6, 23, 0.45);
            backdrop-filter: blur(16px);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
            margin-bottom: 18px;
        }

        h1 {
            margin: 0;
            font-size: clamp(1.25rem, 3vw, 1.85rem);
            line-height: 1.2;
            letter-spacing: 0.2px;
        }

        .status {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .badge,
        .counter {
            padding: 7px 12px;
            border-radius: 999px;
            font-size: 12px;
            letter-spacing: 0.6px;
            font-weight: 700;
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .badge {
            background: rgba(34, 197, 94, 0.24);
            color: #86efac;
        }

        .counter {
            background: rgba(56, 189, 248, 0.2);
            color: #7dd3fc;
            min-width: 40px;
            text-align: center;
        }

        .controls {
            margin-bottom: 18px;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid rgba(148, 163, 184, 0.24);
            background: rgba(15, 23, 42, 0.7);
            color: var(--text-main);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input::placeholder {
            color: #64748b;
        }

        input:focus-visible {
            border-color: #38bdf8;
            box-shadow: 0 0 0 4px var(--ring);
        }

        button {
            padding: 11px 16px;
            border-radius: 12px;
            border: 1px solid transparent;
            cursor: pointer;
            font-weight: 700;
            color: #f8fafc;
            transition: transform 0.15s ease, filter 0.2s ease, box-shadow 0.2s ease;
        }

        button:hover {
            filter: brightness(1.08);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        button:focus-visible {
            outline: none;
            box-shadow: 0 0 0 4px var(--ring);
        }

        .btn-green {
            background: linear-gradient(180deg, #22c55e, #16a34a);
        }

        .btn-blue {
            background: linear-gradient(180deg, #3b82f6, #2563eb);
        }

        .feed {
            border-radius: 14px;
            border: 1px solid rgba(148, 163, 184, 0.16);
            background: var(--surface-strong);
            min-height: 320px;
            padding: 8px 14px 18px;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 4px 0 0;
        }

        li {
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.74), rgba(15, 23, 42, 0.86));
            border: 1px solid rgba(148, 163, 184, 0.15);
            margin: 12px 0;
            padding: 14px 14px 12px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(2, 6, 23, 0.3);
            animation: slideIn 0.3s ease;
        }

        .time {
            font-size: 12px;
            color: var(--text-soft);
        }

        .priority {
            font-size: 11px;
            font-weight: 700;
            margin-top: 6px;
            letter-spacing: 0.4px;
        }

        .empty {
            text-align: center;
            margin-top: 56px;
            color: #64748b;
            font-size: 14px;
            letter-spacing: 0.3px;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 760px) {
            body {
                padding: 16px 10px;
            }

            .app {
                padding: 16px;
                border-radius: 16px;
            }

            .header {
                align-items: flex-start;
                flex-direction: column;
            }

            .controls {
                flex-wrap: wrap;
            }

            .controls input {
                min-width: 100%;
            }

            .controls button {
                flex: 1;
            }

            .feed {
                min-height: 260px;
                padding: 8px 10px 14px;
            }

            .empty {
                margin-top: 36px;
            }
        }
    </style>
</head>

<body>

<div class="app">

    <div class="header">
        <h1>🔥 Kafka Notifications</h1>
        <div class="status">
            <div class="badge">LIVE</div>
            <div class="counter" id="count">0</div>
        </div>
    </div>

    <div class="controls">
        <label for="filter" class="sr-only">Filter notifications by userId</label>
        <input id="filter" placeholder="Filter by userId (e.g. user123)">
        <button class="btn-green" onclick="clearAll()">Clear</button>
        <button class="btn-blue" onclick="toggleStream()" id="toggleBtn">Pause</button>
    </div>

    <div class="feed">
        <ul id="notifications"></ul>
        <div id="empty" class="empty">No notifications yet...</div>
    </div>

</div>

<audio id="sound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script>
    const socket = new SockJS('/ws');
    const stompClient = Stomp.over(socket);

    const list = document.getElementById("notifications");
    const empty = document.getElementById("empty");
    const counter = document.getElementById("count");
    const filterInput = document.getElementById("filter");
    const sound = document.getElementById("sound");
    const toggleBtn = document.getElementById("toggleBtn");

    let count = 0;
    let paused = false;

    const typeColor = {
        payment: "#ef4444",
        success: "#22c55e",
        alert: "#facc15"
    };

    const priorityColor = {
        HIGH: "#ef4444",
        MEDIUM: "#facc15",
        LOW: "#22c55e"
    };

    stompClient.connect({}, function () {
        console.log("Connected ✅");

        stompClient.subscribe('/topic/notifications', function (message) {

            if (paused) return;

            const data = JSON.parse(message.body);

            const filter = filterInput.value.trim();
            if (filter && data.userId !== filter) return;

            const li = document.createElement("li");

            // Apply type color
            li.style.borderLeft = `5px solid ${typeColor[data.type] || "#38bdf8"}`;

            li.innerHTML = `
                <div>💬 ${data.message}</div>

                <div class="priority" style="color:${priorityColor[data.priority] || "#94a3b8"}">
                    ${data.priority || "NORMAL"}
                </div>

                <div class="time">
                    ${new Date(data.timestamp).toLocaleTimeString()}
                </div>
            `;

            list.prepend(li);
            empty.style.display = "none";

            // sound
            sound.play().catch(() => {});

            // counter
            count++;
            counter.innerText = count;

            // max limit
            if (list.children.length > 20) {
                list.removeChild(list.lastChild);
                count--;
                counter.innerText = count;
            }

            // auto remove
            setTimeout(() => {
                li.remove();
                count--;
                counter.innerText = count;

                if (count <= 0) {
                    empty.style.display = "block";
                }
            }, 12000);
        });

    }, function (error) {
        console.error("Connection failed ❌", error);
    });

    function clearAll() {
        list.innerHTML = "";
        count = 0;
        counter.innerText = 0;
        empty.style.display = "block";
    }

    function toggleStream() {
        paused = !paused;
        toggleBtn.innerText = paused ? "Resume" : "Pause";
    }
</script>

</body>
</html>
