<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kafka Live Notifications</title>

    <!-- WebSocket libs -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            display: flex;
            justify-content: center;
        }

        .app {
            width: 90%;
            max-width: 900px;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 { margin: 0; }

        .status {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .badge {
            background: #22c55e;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
        }

        .counter {
            background: #38bdf8;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        button {
            padding: 10px 15px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-green { background: #22c55e; color: white; }
        .btn-blue { background: #3b82f6; color: white; }

        ul {
            list-style: none;
            padding: 0;
            margin-top: 20px;
        }

        li {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            margin: 12px 0;
            padding: 16px;
            border-radius: 12px;
            animation: slideIn 0.4s ease;
        }

        .time {
            font-size: 12px;
            color: #94a3b8;
        }

        .priority {
            font-size: 11px;
            font-weight: bold;
            margin-top: 5px;
        }

        .empty {
            text-align: center;
            margin-top: 50px;
            color: #64748b;
        }

        @keyframes slideIn {
            from {opacity:0; transform:translateY(30px);}
            to {opacity:1; transform:translateY(0);}
        }
    </style>
</head>

<body>

<div class="app">

    <div class="header">
        <h1>🔥 Kafka Notifications</h1>
        <div class="status">
            <div class="badge">LIVE</div>
            <div class="counter" id="count">0</div>
        </div>
    </div>

    <div class="controls">
        <input id="filter" placeholder="Filter by userId (e.g. user123)">
        <button class="btn-green" onclick="clearAll()">Clear</button>
        <button class="btn-blue" onclick="toggleStream()" id="toggleBtn">Pause</button>
    </div>

    <ul id="notifications"></ul>
    <div id="empty" class="empty">No notifications yet...</div>

</div>

<audio id="sound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script>
    const socket = new SockJS('/ws');
    const stompClient = Stomp.over(socket);

    const list = document.getElementById("notifications");
    const empty = document.getElementById("empty");
    const counter = document.getElementById("count");
    const filterInput = document.getElementById("filter");
    const sound = document.getElementById("sound");
    const toggleBtn = document.getElementById("toggleBtn");

    let count = 0;
    let paused = false;

    const typeColor = {
        payment: "#ef4444",
        success: "#22c55e",
        alert: "#facc15"
    };

    const priorityColor = {
        HIGH: "#ef4444",
        MEDIUM: "#facc15",
        LOW: "#22c55e"
    };

    stompClient.connect({}, function () {
        console.log("Connected ✅");

        stompClient.subscribe('/topic/notifications', function (message) {

            if (paused) return;

            const data = JSON.parse(message.body);

            const filter = filterInput.value.trim();
            if (filter && data.userId !== filter) return;

            const li = document.createElement("li");

            // Apply type color
            li.style.borderLeft = `5px solid ${typeColor[data.type] || "#38bdf8"}`;

            li.innerHTML = `
                <div>💬 ${data.message}</div>

                <div class="priority" style="color:${priorityColor[data.priority] || "#94a3b8"}">
                    ${data.priority || "NORMAL"}
                </div>

                <div class="time">
                    ${new Date(data.timestamp).toLocaleTimeString()}
                </div>
            `;

            list.prepend(li);
            empty.style.display = "none";

            // sound
            sound.play().catch(() => {});

            // counter
            count++;
            counter.innerText = count;

            // max limit
            if (list.children.length > 20) {
                list.removeChild(list.lastChild);
                count--;
                counter.innerText = count;
            }

            // auto remove
            setTimeout(() => {
                li.remove();
                count--;
                counter.innerText = count;

                if (count <= 0) {
                    empty.style.display = "block";
                }
            }, 12000);
        });

    }, function (error) {
        console.error("Connection failed ❌", error);
    });

    function clearAll() {
        list.innerHTML = "";
        count = 0;
        counter.innerText = 0;
        empty.style.display = "block";
    }

    function toggleStream() {
        paused = !paused;
        toggleBtn.innerText = paused ? "Resume" : "Pause";
    }
</script>

</body>
</html>
