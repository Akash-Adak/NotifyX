<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kafka Notification System</title>

    <!-- WebSocket libs -->
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: #f5f7fa;
            color: #2c3e50;
            line-height: 1.6;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            color: #2c3e50;
        }

        .status-container {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: #e8f5e9;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            color: #2e7d32;
        }

        .status-badge .dot {
            width: 8px;
            height: 8px;
            background: #4caf50;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .notification-count {
            padding: 8px 16px;
            background: #e3f2fd;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            color: #1565c0;
        }

        .controls {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            justify-content: flex-end;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-clear {
            background: #f5f5f5;
            color: #2c3e50;
            border: 1px solid #d0d7de;
        }

        .btn-clear:hover {
            background: #e5e5e5;
        }

        .notifications-section {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            overflow: hidden;
        }

        .notifications-list {
            list-style: none;
            max-height: 600px;
            overflow-y: auto;
        }

        .notification-item {
            padding: 16px 20px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            gap: 12px;
            animation: slideIn 0.3s ease-out;
            transition: background-color 0.2s;
        }

        .notification-item:last-child {
            border-bottom: none;
        }

        .notification-item:hover {
            background: #f9f9f9;
        }

        .notification-icon {
            font-size: 20px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .notification-content {
            flex: 1;
            min-width: 0;
        }

        .notification-message {
            font-size: 14px;
            color: #2c3e50;
            word-break: break-word;
            margin-bottom: 6px;
        }

        .notification-meta {
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: #94a3b8;
        }

        .notification-user {
            font-weight: 500;
            color: #1976d2;
        }

        .empty-state {
            padding: 60px 20px;
            text-align: center;
            color: #9ca3af;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        .empty-state-text {
            font-size: 16px;
            color: #6b7280;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Scrollbar styling */
        .notifications-list::-webkit-scrollbar {
            width: 8px;
        }

        .notifications-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .notifications-list::-webkit-scrollbar-thumb {
            background: #d0d7de;
            border-radius: 4px;
        }

        .notifications-list::-webkit-scrollbar-thumb:hover {
            background: #b0b8c2;
        }
    </style>


</head>

<body>

<div class="container">
    <div class="header">
        <h1>Kafka Notification System</h1>
        <div class="status-container">
            <div class="status-badge">
                <span class="dot"></span>
                Live
            </div>
            <div class="notification-count" id="count">0 notifications</div>
        </div>
    </div>

    <div class="controls">
        <button class="btn btn-clear" onclick="clearAll()">Clear All</button>
    </div>

    <div class="notifications-section">
        <ul id="notifications" class="notifications-list"></ul>
        <div id="empty" class="empty-state">
            <div class="empty-state-icon">📭</div>
            <div class="empty-state-text">No notifications yet. Waiting for incoming events...</div>
        </div>
    </div>
</div>

<script>
    const socket = new SockJS('/ws');
    const stompClient = Stomp.over(socket);

    const list = document.getElementById("notifications");
    const empty = document.getElementById("empty");
    const counter = document.getElementById("count");

    let count = 0;

    stompClient.connect({}, function () {
        console.log("✅ WebSocket Connected");

        stompClient.subscribe('/topic/notifications', function (message) {
            const data = JSON.parse(message.body);

            const li = document.createElement("li");
            li.className = "notification-item";

            const timestamp = new Date(data.timestamp).toLocaleString();

            li.innerHTML = `
                <div class="notification-icon">📨</div>
                <div class="notification-content">
                    <div class="notification-message">${escapeHtml(data.message)}</div>
                    <div class="notification-meta">
                        <span><strong class="notification-user">${escapeHtml(data.userId || 'System')}</strong></span>
                        <span>${timestamp}</span>
                    </div>
                </div>
            `;

            list.prepend(li);
            empty.style.display = "none";

            // Update counter
            count++;
            updateCounter();

            // Auto remove after 15 seconds
            setTimeout(() => {
                li.remove();
                count--;
                updateCounter();
                if (count === 0) empty.style.display = "block";
            }, 15000);
        });
    });

    function updateCounter() {
        counter.innerText = count + (count === 1 ? ' notification' : ' notifications');
    }

    function clearAll() {
        list.innerHTML = "";
        count = 0;
        updateCounter();
        empty.style.display = "block";
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
</script>

</body>
</html>
